
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="fonts/icomoon/style.css">

    <link rel="stylesheet" href="css/owl.carousel.min.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <!-- Style -->
    <link rel="stylesheet" href="css/style.css">

    <title>School Information Management System</title>
   
  </head>
  <body>
  

  
  <div class="content">
    <div class="container">
      <div class="row">
        <div class="col-md-6">
         <center> <img src="images/graduation.png" width="350" height="350"  alt="Image" class="img-fluid">
                     </center>
        </div>
        <div class="col-md-6 contents">
          <div class="row justify-content-center">
            <div class="col-md-8">
              <div class="mb-4">
             <center><h5><b>SCHOOL INFORMATION SYSTEM</b></h5></center> 
             
              <p class="mb-4">Please,Use your Correct Credentials to Login the system</p>
           
            </div>
            <form action="dashboard.html" method="post">
              <div class="form-group first">
                <label for="username">Full Name</label>
                <input type="text" class="form-control" id="fullname" required>

              </div>
              <p><div class="col-md-6">
                                    <div class="form-group mb-3">
                                    
                                           <select name="designation" class="form-control" required>
									<option value=""><span class="flag-icon flag-icon-gr"></span>Designation</option>
									<option value="Head Master">Head Master</option>
									<option value="Statistics Teacher">Statistics Teacher</option>
									     <option value="Language Teacher">Language Teacher</option>
									          <option value="School Matron">School Matron</option>
									               <option value="Mathematics Teacher">Mathematics Teacher</option>
                                    <option value="Geography Teacher">Geography Teacher</option>
									<option value="Biology Teacher">Biology Teacher</option>
                                    <option value="Civics Teacher">Civics Teacher</option>
									<option value="Book-Keeping Teacher">Book-Keeping Teacher</option>
                                    
                                    <option value="Commerce Teacher">Commerce Teacher</option>
									<option value="Agriculture Teacher">Agriculture Teacher</option>
                                    <option value="History Teacher">History Teacher</option>
									<option value="Chemistry Teacher">Chemistry Teacher</option>
                                    <option value="Physics Teacher">Physics Teacher</option>
                                    <option value="Other Subjects Teacher">Other Subjects Teacher</option>
                                           
								
                                         </select>
                                        </div>
                                    </div> 
                                    </p> 


               <div class="form-group first">
                <label for="username">Phone Number</label>
                <input type="number" class="form-control" id="username" required>

              </div>

               
              <div class="form-group last mb-4">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" required>
                
              </div>

               <div class="form-group last mb-4">
                <label for="password">Confirm Password</label>
                <input type="password" class="form-control" id="confirmpassword" required>
                
              </div>
              
                 <div class="d-flex mb-5 align-items-center">
               
                <span class="ml-auto"><a href="index.html" class="forgot-pass">Login</a></span> 
              </div>

             
              <input type="submit" value="Register Now" class="btn btn-block btn-primary">

              <span class="d-block text-left my-4 text-muted">Developed by <font color="darkblue">Fridolin</font></span>
              
           
            </form>
            </div>
          </div>
          
        </div>
        
      </div>
    </div>
  </div>

  
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
